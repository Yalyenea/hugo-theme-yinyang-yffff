{{ $giscus := .Site.Params.giscus }}
{{ if and $giscus $giscus.enabled $giscus.repo $giscus.repoId $giscus.category $giscus.categoryId }}
  {{ $lang := or $giscus.lang .Site.Language.Lang }}
  {{ if eq $lang "cn" }}{{ $lang = "zh-CN" }}{{ end }}
  <div class="post-comments">
    <div id="giscus"></div>
    <script>
      (function () {
        const container = document.getElementById('giscus');
        if (!container) {
          return;
        }

        const themeConfig = {
          light: '{{ or $giscus.themeLight "light" }}',
          dark: '{{ or $giscus.themeDark "dark" }}'
        };
        window.__giscusThemeMap = themeConfig;

        function resolveTheme() {
          return document.documentElement.getAttribute('data-theme') === 'dark'
            ? themeConfig.dark
            : themeConfig.light;
        }

        const script = document.createElement('script');
        script.src = 'https://giscus.app/client.js';
        script.async = true;
        script.crossOrigin = 'anonymous';
        script.setAttribute('data-repo', '{{ $giscus.repo }}');
        script.setAttribute('data-repo-id', '{{ $giscus.repoId }}');
        script.setAttribute('data-category', '{{ $giscus.category }}');
        script.setAttribute('data-category-id', '{{ $giscus.categoryId }}');
        script.setAttribute('data-mapping', '{{ or $giscus.mapping "pathname" }}');
        script.setAttribute('data-strict', '{{ or $giscus.strict "0" }}');
        script.setAttribute('data-reactions-enabled', '{{ or $giscus.reactionsEnabled "1" }}');
        script.setAttribute('data-emit-metadata', '{{ or $giscus.emitMetadata "0" }}');
        script.setAttribute('data-input-position', '{{ or $giscus.inputPosition "top" }}');
        script.setAttribute('data-lang', '{{ $lang }}');
        script.setAttribute('data-theme', resolveTheme());
        container.appendChild(script);
      })();
    </script>
  </div>
{{ end }}
